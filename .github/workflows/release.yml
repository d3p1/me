##
# @description Release automation
# @author      C. M. de Picciotto <d3p1@d3p1.dev> (https://d3p1.dev/)
# @note        Add `docker-build-flags` to mount secrets required to build
#              the pages that use the GitHub API
# @link        https://semantic-release.gitbook.io/semantic-release/recipes/ci-configurations/github-actions
##
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name   : Dispatch release
    runs-on: ubuntu-latest

    permissions:
      contents     : write
      issues       : write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate release
        uses: d3p1/semantic-releasify@v1
        with:
          is-docker-release: true
          docker-project: 'd3p1'
          docker-image: 'me'
          docker-file: 'Dockerfile'
          docker-build-flags: '{"secret": ["id=github-username,env=GITHUB_USERNAME", "id=github-token,env=GITHUB_TOKEN"]}'
        env :
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}